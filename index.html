<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA V39 | CHAT ONLY</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #007aff; border: none; color: white; font-weight: bold; border-radius: 10px; }
        #chat { display: none; text-align: left; }
        #msgs { height: 300px; overflow-y: auto; border: 1px solid #222; padding: 10px; margin-bottom: 10px; border-radius: 10px; background: #050505; }
    </style>
</head>
<body>

    <div id="auth">
        <h1>ULTRA V38</h1>
        <input type="email" id="e" placeholder="Email">
        <input type="password" id="p" placeholder="Password">
        <button onclick="entry()">ВОЙТИ</button>
    </div>

    <div id="chat">
        <h3 id="status">Чат активен</h3>
        <div id="msgs"></div>
        <input type="text" id="m" placeholder="Сообщение...">
        <button onclick="send()">ОТПРАВИТЬ</button>
    </div>

    <script>
        const cfg = {
            apiKey: "AIzaSyDutfZZER58asyHr68zWlCx7B5k1adFhIk",
            databaseURL: "https://morozov-ultra-default-rtdb.firebaseio.com",
            projectId: "morozov-ultra"
        };
        firebase.initializeApp(cfg);
        
        var userNow, room, nick;

        function entry() {
            var email = document.getElementById('e').value;
            var pass = document.getElementById('p').value;
            firebase.auth().signInWithEmailAndPassword(email, pass)
                .catch(function(err) { alert(err.message); });
        }

        firebase.auth().onAuthStateChanged(function(u) {
            if(u) {
                userNow = u;
                document.getElementById('auth').style.display = 'none';
                document.getElementById('chat').style.display = 'block';
                nick = prompt("Твой ник для чата:");
                var pNick = prompt("Ник друга:");
                room = [u.uid, pNick].sort().join(""); // Упрощенно для теста
                
                firebase.database().ref('v38/test/' + room).on('value', function(s) {
                    var b = document.getElementById('msgs');
                    b.innerHTML = "";
                    s.forEach(function(m) {
                        b.innerHTML += "<div><b>" + m.val().s + ":</b> " + m.val().t + "</div>";
                    });
                    b.scrollTop = b.scrollHeight;
                });
            }
        });

        function send() {
            var v = document.getElementById('m').value;
            if(!v) return;
            firebase.database().ref('v38/test/' + room).push({s: nick, t: v});
            document.getElementById('m').value = "";
        }
    </script>
</body>
</html>
