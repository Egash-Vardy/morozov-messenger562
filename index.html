<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Speeky Titan v60</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #000; --accent: #3d5afe; --gray: #1c1c1e; --danger: #ff3b30; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }

        /* Экраны */
        .screen { position: fixed; inset: 0; display: none; background: var(--bg); z-index: 100; flex-direction: column; }
        .screen.active { display: flex; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--gray); }

        /* Список чатов */
        .chat-item { display: flex; align-items: center; padding: 15px; gap: 15px; border-bottom: 0.5px solid #111; cursor: pointer; }
        .ava { width: 50px; height: 50px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Окно чата */
        #chat-win { z-index: 500; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #chat-win.active { display: flex; transform: translateX(0); }
        .msg-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 90px; }

        /* Сообщения */
        .bubble { padding: 10px 14px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; position: relative; }
        .bubble.me { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .bubble.him { align-self: flex-start; background: var(--gray); border-bottom-left-radius: 4px; }
        .bubble img { max-width: 100%; border-radius: 10px; display: block; margin-top: 5px; }
        .sticker-msg { background: transparent !important; font-size: 80px; padding: 0; align-self: center; }

        /* Ввод */
        .input-bar { padding: 10px 15px 30px; background: #000; display: flex; align-items: center; gap: 12px; border-top: 0.5px solid var(--gray); }
        .input-box { flex: 1; background: var(--gray); border: none; padding: 12px 18px; border-radius: 25px; color: #fff; font-size: 16px; }
        .ptt-circle { width: 48px; height: 48px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; cursor: pointer; }
        .ptt-circle.recording { background: var(--danger); color: #fff; transform: scale(1.2); }

        /* Панель стикеров */
        #sticker-panel { display: none; background: var(--gray); padding: 10px; grid-template-columns: repeat(5, 1fr); gap: 10px; position: absolute; bottom: 90px; left: 15px; border-radius: 15px; z-index: 1000; }
        #sticker-panel span { font-size: 30px; cursor: pointer; }

        /* Звонки UI */
        #incoming-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #video-scr { position: fixed; inset: 0; z-index: 3000; display: none; background: #000; }
        #remote-v { width: 100%; height: 100%; background: #000; }
        #local-v { position: absolute; top: 40px; right: 20px; width: 110px; height: 160px; border-radius: 12px; border: 2px solid #fff; z-index: 10; background: #111; overflow: hidden; }

        .call-btn { width: 75px; height: 75px; border-radius: 50%; border: none; font-size: 28px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <section id="scr-main" class="screen active">
        <header>
            <i class="fas fa-bars"></i>
            <b style="font-size: 20px;">Speeky</b>
            <i class="fas fa-user-plus" onclick="App.addFriend()"></i>
        </header>
        <div id="contact-list" style="overflow-y:auto"></div>
    </section>

    <div id="chat-win" class="screen">
        <header>
            <i class="fas fa-chevron-left" onclick="App.closeChat()"></i>
            <b id="chat-name">Name</b>
            <div style="display:flex; gap:20px">
                <i class="fas fa-phone" onclick="Call.sendSignal('audio')"></i>
                <i class="fas fa-video" onclick="Call.sendSignal('video')"></i>
            </div>
        </header>
        <div class="msg-list" id="msg-list"></div>
        <div id="sticker-panel">
            <span onclick="App.sendMsg('👋', 'sticker')">👋</span>
            <span onclick="App.sendMsg('❤️', 'sticker')">❤️</span>
            <span onclick="App.sendMsg('🔥', 'sticker')">🔥</span>
            <span onclick="App.sendMsg('😂', 'sticker')">😂</span>
            <span onclick="App.sendMsg('🤡', 'sticker')">🤡</span>
        </div>
        <div class="input-bar">
            <i class="fas fa-paperclip" onclick="document.getElementById('file-inp').click()" style="color:#8e8e93"></i>
            <i class="fas fa-smile" onclick="App.toggleStickers()" style="color:#8e8e93"></i>
            <input type="text" id="m-inp" class="input-box" placeholder="Сообщение...">
            <div id="ptt-btn" class="ptt-circle"><i class="fas fa-microphone" id="ptt-icon"></i></div>
            <input type="file" id="file-inp" hidden onchange="App.uploadFile(this)">
        </div>
    </div>

    <div id="incoming-overlay">
        <h2 id="caller-label">Входящий вызов...</h2>
        <div style="display:flex; gap:50px; margin-top:60px">
            <button class="call-btn" style="background:var(--danger)" onclick="Call.end()"><i class="fas fa-times"></i></button>
            <button class="call-btn" style="background:#34c759" onclick="Call.accept()"><i class="fas fa-phone"></i></button>
        </div>
    </div>

    <div id="video-scr">
        <div id="remote-v"></div>
        <div id="local-v"></div>
        <button class="call-btn" style="position:absolute; bottom:60px; left:50%; transform:translateX(-50%); background:var(--danger)" onclick="Call.end()"><i class="fas fa-phone-slash"></i></button>
    </div>

    <script>
        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyDutfZZER58asyHr68zWlCx7B5k1adFhIk",
            authDomain: "morozov-ultra.firebaseapp.com",
            databaseURL: "https://morozov-ultra-default-rtdb.firebaseio.com",
            projectId: "morozov-ultra",
            storageBucket: "morozov-ultra.firebasestorage.app",
            messagingSenderId: "255345933856",
            appId: "1:255345933856:web:5b8d1b93696f36eb5d4645"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const AGORA_ID = "e3af51022f9541388ad48fa2675fc3fb";
        const ringtone = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');
        ringtone.loop = true;

        let myName = localStorage.getItem('snick') || prompt("Ник:") || "User";
        localStorage.setItem('snick', myName);
        let activePeer = null;

        // --- APP ---
        const App = {
            addFriend: () => {
                const n = prompt("Ник друга:");
                if(n && n !== myName) {
                    let f = JSON.parse(localStorage.getItem('f') || '[]');
                    if(!f.includes(n)) f.push(n);
                    localStorage.setItem('f', JSON.stringify(f));
                    App.renderList();
                }
            },
            renderList: () => {
                const f = JSON.parse(localStorage.getItem('f') || '[]');
                document.getElementById('contact-list').innerHTML = f.map(n => `
                    <div class="chat-item" onclick="App.openChat('${n}')">
                        <div class="ava">${n[0].toUpperCase()}</div>
                        <b>${n}</b>
                    </div>
                `).join('');
            },
            openChat: (n) => {
                activePeer = n;
                document.getElementById('chat-name').innerText = n;
                document.getElementById('chat-win').classList.add('active');
                App.listen();
            },
            closeChat: () => { document.getElementById('chat-win').classList.remove('active'); activePeer = null; },
            toggleStickers: () => { const p = document.getElementById('sticker-panel'); p.style.display = p.style.display==='grid'?'none':'grid'; },
            sendMsg: (val, type='text') => {
                const rid = [myName, activePeer].sort().join('_');
                db.ref('chats/'+rid).push({ s: myName, m: val, type: type, t: Date.now() });
                document.getElementById('m-inp').value = "";
                document.getElementById('sticker-panel').style.display = 'none';
            },
            uploadFile: (input) => {
                const file = input.files[0];
                const r = new FileReader();
                r.onload = () => App.sendMsg(r.result, file.type.includes('image') ? 'img' : 'file');
                r.readAsDataURL(file);
            },
            listen: () => {
                const rid = [myName, activePeer].sort().join('_');
                db.ref('chats/'+rid).on('value', snap => {
                    const list = document.getElementById('msg-list');
                    list.innerHTML = "";
                    snap.forEach(m => {
                        const d = m.val();
                        let html = d.m;
                        if(d.type==='img') html = `<img src="${d.m}">`;
                        if(d.type==='voice') html = `<div onclick="new Audio('${d.m}').play()"><i class="fas fa-play"></i> ГС</div>`;
                        list.innerHTML += `<div class="bubble ${d.s===myName?'me':'him'} ${d.type==='sticker'?'sticker-msg':''}">${html}</div>`;
                    });
                    list.scrollTop = list.scrollHeight;
                });
            }
        };

        // --- CALLS (HANDSHAKE FIXED) ---
        const Call = {
            client: null, tracks: [], partner: null,
            init: () => {
                db.ref('sigs/'+myName).on('value', snap => {
                    const s = snap.val();
                    if(s && s.type==='call') {
                        Call.partner = s.from;
                        document.getElementById('caller-label').innerText = s.from + " звонит...";
                        document.getElementById('incoming-overlay').style.display = 'flex';
                        ringtone.play().catch(()=>{});
                    } else if(!s) {
                        document.getElementById('incoming-overlay').style.display = 'none';
                        document.getElementById('video-scr').style.display = 'none';
                        ringtone.pause();
                    }
                });
            },
            sendSignal: async (type) => {
                await db.ref('sigs/'+activePeer).set({ type:'call', from:myName, mode:type });
                Call.startAgora(type, activePeer);
            },
            accept: () => { 
                ringtone.pause(); 
                Call.startAgora('video', Call.partner); 
            },
            end: async () => {
                await db.ref('sigs/'+myName).remove();
                if(activePeer) await db.ref('sigs/'+activePeer).remove();
                if(Call.partner) await db.ref('sigs/'+Call.partner).remove();
                location.reload();
            },
            startAgora: async (mode, partnerNick) => {
                document.getElementById('video-scr').style.display = 'block';
                document.getElementById('remote-v').innerHTML = ""; // Чистим экран
                
                Call.client = AgoraRTC.createClient({ mode:"rtc", codec:"vp8" });
                const room = [myName, partnerNick].sort().join('_');
                
                try {
                    await Call.client.join(AGORA_ID, room, null, null);
                    
                    // Микрофон
                    const mic = await AgoraRTC.createMicrophoneAudioTrack();
                    Call.tracks = [mic];

                    // Камера
                    if(mode === 'video') {
                        const cam = await AgoraRTC.createCameraVideoTrack();
                        Call.tracks.push(cam);
                        cam.play("local-v");
                    }

                    await Call.client.publish(Call.tracks);

                    // СЛУШАЕМ СОБЕСЕДНИКА
                    Call.client.on("user-published", async (user, mediaType) => {
                        await Call.client.subscribe(user, mediaType);
                        if (mediaType === "video") {
                            user.videoTrack.play("remote-v");
                        }
                        if (mediaType === "audio") {
                            user.audioTrack.play();
                        }
                    });
                } catch(e) { console.error(e); }
            }
        };

        // --- VOICE ---
        const ptt = document.getElementById('ptt-btn');
        let rec=null, chunks=[];
        ptt.onmousedown = ptt.ontouchstart = async (e) => {
            e.preventDefault();
            if(document.getElementById('m-inp').value) { App.sendMsg(document.getElementById('m-inp').value); return; }
            try {
                const s = await navigator.mediaDevices.getUserMedia({audio:true});
                rec = new MediaRecorder(s);
                chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => {
                    const r = new FileReader(); r.readAsDataURL(new Blob(chunks));
                    r.onloadend = () => App.sendMsg(r.result, 'voice');
                };
                rec.start();
                ptt.classList.add('recording');
            } catch(e) {}
        };
        window.onmouseup = window.ontouchend = () => { if(rec && rec.state==='recording'){rec.stop(); ptt.classList.remove('recording');}};

        App.renderList();
        Call.init();
    </script>
</body>
</html>
