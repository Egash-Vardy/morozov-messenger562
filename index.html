<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Speeky Clone</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --accent: #5c6bc0;
            --text-dim: #8e8e93;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }

        /* AUTH SCREEN */
        .screen { position: fixed; inset: 0; display: none; background: var(--bg); z-index: 100; flex-direction: column; }
        .screen.active { display: flex; }
        .auth-content { margin: auto; width: 80%; max-width: 320px; text-align: center; }
        .auth-input { width: 100%; padding: 16px; background: #1c1c1e; border: none; border-radius: 14px; color: #fff; margin-bottom: 10px; font-size: 16px; }
        .auth-btn { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 14px; font-weight: 700; margin-top: 10px; }

        /* LIST SCREEN */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .search-box { background: #1c1c1e; margin: 0 20px 15px; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; color: var(--text-dim); }
        .chat-item { display: flex; align-items: center; padding: 12px 20px; gap: 15px; position: relative; }
        .avatar { width: 52px; height: 52px; border-radius: 50%; background: #2c2c2e; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .chat-info { flex: 1; border-bottom: 0.5px solid #1c1c1e; padding-bottom: 12px; }
        .chat-meta { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .chat-last { color: var(--text-dim); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }

        /* CHAT WINDOW (OVERLAY) */
        #chat-window { position: fixed; inset: 0; background: #000; z-index: 200; display: none; flex-direction: column; transform: translateY(20px); opacity: 0; transition: 0.25s ease-out; }
        #chat-window.active { display: flex; transform: translateY(0); opacity: 1; }
        .chat-head { padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 0.5px solid #1c1c1e; }
        .msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }

        /* MESSAGE BUBBLES */
        .bubble { 
            padding: 8px 12px 6px 14px; border-radius: 18px; max-width: 80%; position: relative; font-size: 16px; min-width: 60px;
            display: flex; flex-direction: column;
        }
        .bubble.me { align-self: flex-end; background: #3d5afe; border-bottom-right-radius: 4px; }
        .bubble.him { align-self: flex-start; background: #1c1c1e; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; align-self: flex-end; margin-top: 2px; opacity: 0.7; margin-left: 10px; }

        /* EMPTY STATE */
        .empty-view { margin: auto; text-align: center; width: 80%; }
        .hand-icon { font-size: 80px; margin: 20px 0; cursor: pointer; display: inline-block; animation: wave 1s infinite alternate; }
        @keyframes wave { from { transform: rotate(0deg); } to { transform: rotate(15deg); } }

        /* INPUT AREA */
        .input-bar { padding: 10px 15px 30px; display: flex; align-items: center; gap: 12px; background: #000; }
        .input-box { flex: 1; background: #1c1c1e; border: none; padding: 12px 20px; border-radius: 25px; color: #fff; font-size: 16px; }
        .icon-btn { color: var(--text-dim); font-size: 20px; }
        .send-round { width: 42px; height: 42px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; }
    </style>
</head>
<body>

    <section id="scr-auth" class="screen">
        <div class="auth-content">
            <h1 style="font-size: 40px; margin-bottom: 40px;">Speeky</h1>
            <input type="email" id="email" class="auth-input" placeholder="Email">
            <input type="password" id="pass" class="auth-input" placeholder="Password">
            <input type="text" id="nick" class="auth-input" placeholder="Your Name">
            <button class="auth-btn" onclick="Auth.init()">Continue</button>
        </div>
    </section>

    <section id="scr-main" class="screen">
        <header>
            <div style="width: 32px;"></div> <div style="font-weight: 700; font-size: 18px;">Speeky</div>
            <i class="fas fa-plus" onclick="UI.addContact()" style="font-size: 18px;"></i>
        </header>
        <div class="search-box"><i class="fas fa-search"></i> Поиск</div>
        <div id="contact-list" style="flex:1; overflow-y: auto;"></div>
    </section>

    <div id="chat-window" class="chat-window">
        <div class="chat-head">
            <i class="fas fa-chevron-left" onclick="UI.closeChat()"></i>
            <div class="avatar" id="head-ava" style="width:36px; height:36px; font-size:14px;"></div>
            <div style="font-weight: 600;" id="head-name">Name</div>
        </div>
        <div class="msg-container" id="msg-list"></div>
        <div class="input-bar">
            <i class="fas fa-paperclip icon-btn"></i>
            <input type="text" id="msg-input" class="input-box" placeholder="Сообщение...">
            <div class="send-round" onclick="Chat.send()"><i class="fas fa-arrow-up"></i></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDutfZZER58asyHr68zWlCx7B5k1adFhIk",
            authDomain: "morozov-ultra.firebaseapp.com",
            databaseURL: "https://morozov-ultra-default-rtdb.firebaseio.com",
            projectId: "morozov-ultra",
            storageBucket: "morozov-ultra.firebasestorage.app",
            messagingSenderId: "255345933856",
            appId: "1:255345933856:web:5b8d1b93696f36eb5d4645"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let me = null;
        let activePeer = null;

        const Auth = {
            init: async () => {
                const e = document.getElementById('email').value;
                const p = document.getElementById('pass').value;
                const n = document.getElementById('nick').value;
                try {
                    const res = await auth.signInWithEmailAndPassword(e, p);
                } catch {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await res.user.updateProfile({ displayName: n });
                    location.reload();
                }
            }
        };

        const UI = {
            renderList: () => {
                const contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
                const container = document.getElementById('contact-list');
                container.innerHTML = contacts.map(c => `
                    <div class="chat-item" onclick="UI.openChat('${c}')">
                        <div class="avatar">${c[0]}</div>
                        <div class="chat-info">
                            <div class="chat-meta">
                                <span style="font-weight:600">${c}</span>
                                <span style="color:var(--text-dim); font-size:12px">15м</span>
                            </div>
                            <div class="chat-last" id="l-${c}">Начните беседу...</div>
                        </div>
                    </div>
                `).join('');
            },
            addContact: () => {
                const n = prompt("Ник друга:");
                if(n) {
                    let c = JSON.parse(localStorage.getItem('contacts') || '[]');
                    if(!c.includes(n)) c.push(n);
                    localStorage.setItem('contacts', JSON.stringify(c));
                    UI.renderList();
                }
            },
            openChat: (name) => {
                activePeer = name;
                document.getElementById('head-name').innerText = name;
                document.getElementById('head-ava').innerText = name[0];
                const win = document.getElementById('chat-window');
                win.style.display = 'flex';
                setTimeout(() => win.classList.add('active'), 10);
                Chat.listen();
            },
            closeChat: () => {
                const win = document.getElementById('chat-window');
                win.classList.remove('active');
                setTimeout(() => win.style.display = 'none', 250);
            }
        };

        const Chat = {
            listen: () => {
                const rid = [me.displayName, activePeer].sort().join('_');
                const list = document.getElementById('msg-list');
                db.ref('chats/' + rid).on('value', snap => {
                    if(!snap.exists()) {
                        list.innerHTML = `
                            <div class="empty-view">
                                <h2 style="font-size:24px">Начните беседу</h2>
                                <p style="color:var(--text-dim); margin-top:8px">Сообщений пока нет — отправьте первое</p>
                                <div class="hand-icon" onclick="Chat.send('👋')">👋</div>
                                <p style="font-size:12px; color:var(--text-dim)">Поприветствуйте собеседника одним касанием</p>
                            </div>`;
                        return;
                    }
                    list.innerHTML = "";
                    snap.forEach(m => {
                        const d = m.val();
                        const time = new Date(d.t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        list.innerHTML += `
                            <div class="bubble ${d.s === me.displayName ? 'me' : 'him'}">
                                ${d.msg}
                                <span class="msg-time">${time}</span>
                            </div>`;
                    });
                    list.scrollTop = list.scrollHeight;
                });
            },
            send: (customMsg = null) => {
                const inp = document.getElementById('msg-input');
                const text = customMsg || inp.value;
                if(!text || !activePeer) return;
                const rid = [me.displayName, activePeer].sort().join('_');
                db.ref('chats/' + rid).push({
                    s: me.displayName,
                    msg: text,
                    t: Date.now()
                });
                inp.value = "";
            }
        };

        auth.onAuthStateChanged(user => {
            if(user) {
                me = user;
                document.getElementById('scr-auth').classList.remove('active');
                document.getElementById('scr-main').classList.add('active');
                UI.renderList();
            } else {
                document.getElementById('scr-auth').classList.add('active');
            }
        });
    </script>
</body>
</html>
