<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Speeky Titan v68</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #000; --accent: #3d5afe; --gray: #1c1c1e; --danger: #ff3b30; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }

        /* Модалки и Настройки */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-box { background: var(--gray); padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
        .modal-box h2 { margin-bottom: 15px; }
        .modal-box input { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #000; color: #fff; margin-bottom: 15px; font-size: 16px; }
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .btn-danger { background: var(--danger); }

        /* Основные экраны */
        .screen { position: fixed; inset: 0; display: none; background: var(--bg); z-index: 100; flex-direction: column; }
        .screen.active { display: flex; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--gray); background: #111; }

        .chat-item { display: flex; align-items: center; padding: 15px; gap: 15px; border-bottom: 0.5px solid #111; cursor: pointer; }
        .ava { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }

        /* Окно чата */
        #chat-win { z-index: 500; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #chat-win.active { display: flex; transform: translateX(0); }
        .msg-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 110px; }

        .bubble { padding: 8px 12px; border-radius: 18px; max-width: 75%; position: relative; min-width: 70px; }
        .bubble.me { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .bubble.him { align-self: flex-start; background: var(--gray); border-bottom-left-radius: 4px; }
        .bubble img { max-width: 100%; border-radius: 10px; display: block; margin-top: 5px; }
        .sticker-msg { background: transparent !important; font-size: 70px; padding: 0; align-self: center; }
        .msg-info { font-size: 10px; opacity: 0.6; margin-top: 4px; display: flex; align-items: center; justify-content: flex-end; gap: 3px; }

        /* Панели управления */
        .input-bar { padding: 10px 15px 35px; background: #000; display: flex; align-items: center; gap: 10px; border-top: 0.5px solid var(--gray); }
        .input-box { flex: 1; background: var(--gray); border: none; padding: 12px 18px; border-radius: 25px; color: #fff; }
        #sticker-panel { display: none; background: var(--gray); padding: 10px; grid-template-columns: repeat(5, 1fr); gap: 10px; position: absolute; bottom: 90px; left: 15px; border-radius: 15px; z-index: 1000; }
        #sticker-panel span { font-size: 30px; cursor: pointer; }

        /* Звонки */
        #video-scr { position: fixed; inset: 0; z-index: 3000; display: none; background: #000; }
        #remote-v { width: 100%; height: 100%; }
        #local-v { position: absolute; top: 40px; right: 20px; width: 100px; height: 140px; border-radius: 12px; border: 1px solid #fff; z-index: 10; overflow: hidden; background: #111; }
        .call-controls { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 20; }
        .call-btn { width: 55px; height: 55px; border-radius: 50%; border: none; color: #fff; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .call-btn.hangup { background: var(--danger); width: 65px; height: 65px; }
        #incoming-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2500; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-modal" class="modal">
        <div class="modal-box">
            <h2>Speeky Reg</h2>
            <input type="text" id="auth-input" placeholder="Придумай ник...">
            <button class="btn-main" onclick="Auth.save()">Начать общение</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-box">
            <h2>Настройки</h2>
            <p style="margin-bottom:10px; opacity:0.6">Твой ID: <span id="set-my-id"></span></p>
            <input type="text" id="set-nick-input" placeholder="Новый ник">
            <button class="btn-main" onclick="Auth.updateNick()">Сохранить</button>
            <button class="btn-main btn-danger" onclick="Auth.logout()">Выйти из аккаунта</button>
            <button class="btn-main" style="background:#444" onclick="Auth.toggleSettings(false)">Закрыть</button>
        </div>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-box">
            <h2>Новый контакт</h2>
            <input type="text" id="add-input" placeholder="Ник друга...">
            <button class="btn-main" onclick="App.confirmAdd()">Добавить</button>
            <button class="btn-main" style="background:#444" onclick="document.getElementById('add-modal').classList.remove('active')">Отмена</button>
        </div>
    </div>

    <section id="scr-main" class="screen active">
        <header>
            <i class="fas fa-cog" onclick="Auth.toggleSettings(true)"></i>
            <b id="header-nick">Speeky</b>
            <i class="fas fa-user-plus" onclick="document.getElementById('add-modal').classList.add('active')"></i>
        </header>
        <div id="contact-list"></div>
    </section>

    <div id="chat-win" class="screen">
        <header>
            <i class="fas fa-chevron-left" onclick="App.closeChat()"></i>
            <b id="chat-name">Чат</b>
            <div style="display:flex; gap:15px">
                <i class="fas fa-phone" onclick="Call.sendSignal('audio')"></i>
                <i class="fas fa-video" onclick="Call.sendSignal('video')"></i>
            </div>
        </header>
        <div class="msg-list" id="msg-list"></div>
        <div id="sticker-panel">
            <span onclick="App.sendMsg('👋','sticker')">👋</span><span onclick="App.sendMsg('❤️','sticker')">❤️</span><span onclick="App.sendMsg('😂','sticker')">😂</span><span onclick="App.sendMsg('🔥','sticker')">🔥</span><span onclick="App.sendMsg('🤡','sticker')">🤡</span>
        </div>
        <div class="input-bar">
            <i class="fas fa-paperclip" onclick="document.getElementById('file-inp').click()" style="color:#8e8e93"></i>
            <i class="fas fa-smile" onclick="App.toggleStickers()" style="color:#8e8e93"></i>
            <input type="text" id="m-inp" class="input-box" placeholder="Сообщение...">
            <div id="ptt-btn" class="call-btn" style="width:45px; height:45px; background:#fff; color:#000;"><i class="fas fa-microphone"></i></div>
            <input type="file" id="file-inp" hidden onchange="App.uploadFile(this)">
        </div>
    </div>

    <div id="incoming-overlay">
        <div class="ava" style="width:80px; height:80px; margin-bottom:20px">?</div>
        <h2>Входящий звонок</h2>
        <div style="display:flex; gap:40px; margin-top:40px">
            <button class="call-btn hangup" onclick="Call.end()"><i class="fas fa-times"></i></button>
            <button class="call-btn" style="background:#34c759" onclick="Call.accept()"><i class="fas fa-phone"></i></button>
        </div>
    </div>

    <div id="video-scr">
        <div id="remote-v"></div><div id="local-v"></div>
        <div class="call-controls">
            <button class="call-btn" id="btn-mic" onclick="Call.toggleMic()"><i class="fas fa-microphone"></i></button>
            <button class="call-btn hangup" onclick="Call.end()"><i class="fas fa-phone-slash"></i></button>
            <button class="call-btn" id="btn-vid" onclick="Call.toggleVid()"><i class="fas fa-video"></i></button>
            <button class="call-btn" onclick="Call.flipCamera()"><i class="fas fa-sync-alt"></i></button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDutfZZER58asyHr68zWlCx7B5k1adFhIk",
            authDomain: "morozov-ultra.firebaseapp.com",
            databaseURL: "https://morozov-ultra-default-rtdb.firebaseio.com",
            projectId: "morozov-ultra",
            storageBucket: "morozov-ultra.firebasestorage.app",
            messagingSenderId: "255345933856",
            appId: "1:255345933856:web:5b8d1b93696f36eb5d4645"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const AGORA_ID = "e3af51022f9541388ad48fa2675fc3fb";
        const ringtone = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');
        ringtone.loop = true;

        const Auth = {
            name: localStorage.getItem('snick'),
            init: () => {
                if(!Auth.name) document.getElementById('auth-modal').classList.add('active');
                else Auth.ready();
            },
            save: () => {
                const v = document.getElementById('auth-input').value.trim();
                if(v) { localStorage.setItem('snick', v); Auth.name = v; location.reload(); }
            },
            ready: () => {
                document.getElementById('header-nick').innerText = Auth.name;
                document.getElementById('set-my-id').innerText = Auth.name;
                document.getElementById('set-nick-input').value = Auth.name;
                App.initFriends(); Call.init();
            },
            toggleSettings: (show) => { document.getElementById('settings-modal').classList.toggle('active', show); },
            updateNick: () => {
                const newN = document.getElementById('set-nick-input').value.trim();
                if(newN) { localStorage.setItem('snick', newN); location.reload(); }
            },
            logout: () => { localStorage.removeItem('snick'); location.reload(); }
        };

        const App = {
            confirmAdd: () => {
                const n = document.getElementById('add-input').value.trim();
                if(n && n !== Auth.name) {
                    db.ref('users/'+Auth.name+'/friends/'+n).set(true);
                    db.ref('users/'+n+'/friends/'+Auth.name).set(true);
                    document.getElementById('add-modal').classList.remove('active');
                }
            },
            initFriends: () => {
                db.ref('users/'+Auth.name+'/friends').on('value', snap => {
                    const list = document.getElementById('contact-list'); list.innerHTML = "";
                    snap.forEach(f => list.innerHTML += `<div class="chat-item" onclick="App.openChat('${f.key}')"><div class="ava">${f.key[0].toUpperCase()}</div><b>${f.key}</b></div>`);
                });
            },
            openChat: (n) => { activePeer = n; document.getElementById('chat-name').innerText = n; document.getElementById('chat-win').classList.add('active'); App.listen(); },
            closeChat: () => { document.getElementById('chat-win').classList.remove('active'); activePeer = null; },
            toggleStickers: () => { const p = document.getElementById('sticker-panel'); p.style.display = p.style.display==='grid'?'none':'grid'; },
            sendMsg: (val, type='text') => {
                if(!activePeer) return;
                const rid = [Auth.name, activePeer].sort().join('_');
                db.ref('chats/'+rid).push({ s: Auth.name, m: val, type: type, t: Date.now(), r: false });
                document.getElementById('m-inp').value = ""; document.getElementById('sticker-panel').style.display='none';
            },
            uploadFile: (input) => {
                const f = input.files[0]; const r = new FileReader();
                r.onload = () => App.sendMsg(r.result, f.type.includes('image')?'img':'file'); r.readAsDataURL(f);
            },
            listen: () => {
                const rid = [Auth.name, activePeer].sort().join('_');
                db.ref('chats/'+rid).off();
                db.ref('chats/'+rid).on('value', snap => {
                    const list = document.getElementById('msg-list'); list.innerHTML = "";
                    snap.forEach(m => {
                        const d = m.val(); if(d.s !== Auth.name && !d.r) db.ref('chats/'+rid+'/'+m.key+'/r').set(true);
                        const time = new Date(d.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        const status = d.s === Auth.name ? (d.r ? ' <i class="fas fa-check-double" style="color:#4fc3f7"></i>' : ' <i class="fas fa-check"></i>') : '';
                        let content = d.m;
                        if(d.type==='img') content = `<img src="${d.m}">`;
                        if(d.type==='voice') content = `<div onclick="new Audio('${d.m}').play()"><i class="fas fa-play"></i> ГС</div>`;
                        list.innerHTML += `<div class="bubble ${d.s===Auth.name?'me':'him'} ${d.type==='sticker'?'sticker-msg':''}">${content}<div class="msg-info">${time}${status}</div></div>`;
                    });
                    list.scrollTop = list.scrollHeight;
                });
            }
        };

        const Call = {
            client: null, tracks: [], partner: null, micOn: true, vidOn: true,
            init: () => {
                db.ref('sigs/'+Auth.name).on('value', snap => {
                    const s = snap.val();
                    if(s && s.type==='call') { Call.partner = s.from; document.getElementById('incoming-overlay').style.display = 'flex'; ringtone.play().catch(()=>{}); }
                    else if(!s) { document.getElementById('incoming-overlay').style.display = 'none'; document.getElementById('video-scr').style.display = 'none'; ringtone.pause(); }
                });
            },
            toggleMic: async () => { if(Call.tracks[0]) { Call.micOn = !Call.micOn; await Call.tracks[0].setEnabled(Call.micOn); } },
            toggleVid: async () => { if(Call.tracks[1]) { Call.vidOn = !Call.vidOn; await Call.tracks[1].setEnabled(Call.vidOn); } },
            flipCamera: async () => { if(Call.tracks[1]) { const cams = await AgoraRTC.getCameras(); const cur = Call.tracks[1].getMediaStreamTrack().getSettings().deviceId; const nxt = cams.find(c => c.deviceId !== cur); if(nxt) await Call.tracks[1].setDevice(nxt.deviceId); } },
            sendSignal: async (type) => { await db.ref('sigs/'+activePeer).set({ type:'call', from:Auth.name }); Call.startAgora(type, activePeer); },
            accept: () => { ringtone.pause(); Call.startAgora('video', Call.partner); },
            end: async () => { await db.ref('sigs/'+Auth.name).remove(); if(activePeer) await db.ref('sigs/'+activePeer).remove(); location.reload(); },
            startAgora: async (mode, pNick) => {
                document.getElementById('video-scr').style.display = 'block';
                Call.client = AgoraRTC.createClient({ mode:"rtc", codec:"vp8" });
                await Call.client.join(AGORA_ID, [Auth.name, pNick].sort().join('_'), null, null);
                Call.tracks = [await AgoraRTC.createMicrophoneAudioTrack()];
                if(mode==='video') { Call.tracks[1] = await AgoraRTC.createCameraVideoTrack(); Call.tracks[1].play("local-v"); }
                await Call.client.publish(Call.tracks);
                Call.client.on("user-published", async (u, mt) => { await Call.client.subscribe(u, mt); if(mt==="video") u.videoTrack.play("remote-v"); if(mt==="audio") u.audioTrack.play(); });
            }
        };

        const ptt = document.getElementById('ptt-btn'); let rec=null, chunks=[];
        ptt.onmousedown = ptt.ontouchstart = async (e) => {
            e.preventDefault(); if(document.getElementById('m-inp').value) { App.sendMsg(document.getElementById('m-inp').value); return; }
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            rec = new MediaRecorder(s); chunks = []; rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => { const r = new FileReader(); r.readAsDataURL(new Blob(chunks)); r.onloadend = () => App.sendMsg(r.result, 'voice'); };
            rec.start(); ptt.style.background = "#ff3b30";
        };
        window.onmouseup = window.ontouchend = () => { if(rec && rec.state==='recording'){rec.stop(); ptt.style.background = "#fff";}};
        document.getElementById('m-inp').onkeydown = (e) => { if(e.key==='Enter') App.sendMsg(e.target.value); };

        Auth.init();
    </script>
</body>
</html>
