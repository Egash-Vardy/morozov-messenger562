<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Speeky Titan Ultra</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #000; --accent: #3d5afe; --text-dim: #8e8e93; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }

        /* SCREENS */
        .screen { position: fixed; inset: 0; display: none; background: var(--bg); z-index: 100; flex-direction: column; }
        .screen.active { display: flex; }

        /* LIST */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #1c1c1e; }
        .chat-item { display: flex; align-items: center; padding: 15px 20px; gap: 15px; border-bottom: 0.5px solid #111; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #2c2c2e; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* CHAT WINDOW */
        .chat-window { position: fixed; inset: 0; background: #000; z-index: 200; display: none; flex-direction: column; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .chat-window.active { display: flex; transform: translateX(0); }
        .msg-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* BUBBLES */
        .bubble { padding: 10px 14px; border-radius: 18px; max-width: 75%; font-size: 16px; position: relative; }
        .bubble.me { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .bubble.him { align-self: flex-start; background: #1c1c1e; border-bottom-left-radius: 4px; }
        .bubble.sticker { background: transparent !important; font-size: 60px; padding: 0; }
        
        /* VOICE PLAYER */
        .v-msg { display: flex; align-items: center; gap: 10px; min-width: 150px; }
        .v-play { font-size: 20px; cursor: pointer; }

        /* INPUT & PTT */
        .input-area { padding: 10px 15px 30px; background: #000; display: flex; align-items: center; gap: 15px; }
        .input-box { flex: 1; background: #1c1c1e; border: none; padding: 12px 20px; border-radius: 25px; color: #fff; }
        .ptt-btn { 
            width: 45px; height: 45px; background: #fff; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: #000; 
            transition: 0.2s; cursor: pointer;
        }
        .ptt-btn.recording { background: #ff3b30; color: #fff; transform: scale(1.3); box-shadow: 0 0 20px rgba(255,59,48,0.5); }

        /* CALL OVERLAY */
        .call-ui { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .call-ui.active { display: flex; }
    </style>
</head>
<body>

    <section id="scr-main" class="screen active">
        <header>
            <i class="fas fa-bars"></i>
            <b>Speeky</b>
            <i class="fas fa-user-plus" onclick="App.addFriend()"></i>
        </header>
        <div id="contact-list"></div>
    </section>

    <div id="chat-win" class="chat-window">
        <header>
            <i class="fas fa-chevron-left" onclick="App.closeChat()"></i>
            <b id="chat-name">Name</b>
            <div style="display: flex; gap: 20px;">
                <i class="fas fa-phone" onclick="Voice.startCall()"></i>
                <i class="fas fa-video" onclick="Voice.startCall(true)"></i>
            </div>
        </header>
        <div class="msg-list" id="msg-list"></div>
        <div class="input-area">
            <input type="text" id="m-inp" class="input-box" placeholder="Сообщение...">
            <div id="ptt-btn" class="ptt-btn">
                <i class="fas fa-microphone" id="ptt-icon"></i>
            </div>
        </div>
    </div>

    <div id="call-ui" class="call-ui">
        <div id="remote-v" style="position: absolute; inset: 0;"></div>
        <div id="local-v" style="position: absolute; top: 40px; right: 20px; width: 100px; height: 150px; border-radius: 10px; border: 2px solid var(--accent);"></div>
        <div class="ptt-btn" style="background: #ff3b30; color: #fff; position: absolute; bottom: 50px;" onclick="Voice.endCall()">
            <i class="fas fa-phone-slash"></i>
        </div>
    </div>

    <script>
        // Твой конфиг Firebase из Morozov Ultra
        const firebaseConfig = {
            apiKey: "AIzaSyDutfZZER58asyHr68zWlCx7B5k1adFhIk",
            authDomain: "morozov-ultra.firebaseapp.com",
            databaseURL: "https://morozov-ultra-default-rtdb.firebaseio.com",
            projectId: "morozov-ultra",
            storageBucket: "morozov-ultra.firebasestorage.app",
            messagingSenderId: "255345933856",
            appId: "1:255345933856:web:5b8d1b93696f36eb5d4645"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = "User_" + Math.floor(Math.random()*99);
        let activePeer = null;
        let recorder = null;
        let audioChunks = [];

        const App = {
            addFriend: () => {
                const n = prompt("Ник друга:");
                if(n) {
                    let f = JSON.parse(localStorage.getItem('f_list') || '[]');
                    if(!f.includes(n)) f.push(n);
                    localStorage.setItem('f_list', JSON.stringify(f));
                    App.renderList();
                }
            },
            renderList: () => {
                const f = JSON.parse(localStorage.getItem('f_list') || '[]');
                document.getElementById('contact-list').innerHTML = f.map(n => `
                    <div class="chat-item" onclick="App.openChat('${n}')">
                        <div class="avatar">${n[0]}</div>
                        <div><b>${n}</b><div style="color:#888; font-size:13px">Нажми, чтобы зайти</div></div>
                    </div>
                `).join('');
            },
            openChat: (n) => {
                activePeer = n;
                document.getElementById('chat-name').innerText = n;
                document.getElementById('chat-win').classList.add('active');
                App.listen();
            },
            closeChat: () => document.getElementById('chat-win').classList.remove('active'),
            listen: () => {
                const rid = [myName, activePeer].sort().join('_');
                db.ref('chats/' + rid).on('value', snap => {
                    const list = document.getElementById('msg-list');
                    list.innerHTML = "";
                    snap.forEach(m => {
                        const d = m.val();
                        const isS = d.msg === "👋";
                        let content = d.msg;
                        
                        if(d.type === 'voice') {
                            content = `<div class="v-msg"><i class="fas fa-play v-play" onclick="new Audio('${d.msg}').play()"></i> <span>Голосовое</span></div>`;
                        }

                        list.innerHTML += `<div class="bubble ${d.s === myName ? 'me' : 'him'} ${isS ? 'sticker' : ''}">${content}</div>`;
                    });
                    list.scrollTop = list.scrollHeight;
                });
            }
        };

        // --- ГОЛОСОВЫЕ (PTT) ---
        const ptt = document.getElementById('ptt-btn');
        ptt.onmousedown = ptt.ontouchstart = async () => {
            if(document.getElementById('m-inp').value) { App.sendText(); return; } // Если есть текст, просто шлем его
            
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            audioChunks = [];
            recorder.ondataavailable = e => audioChunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => App.sendVoice(reader.result);
            };
            recorder.start();
            ptt.classList.add('recording');
            document.getElementById('ptt-icon').className = "fas fa-waveform";
        };

        ptt.onmouseup = ptt.ontouchend = () => {
            if(recorder && recorder.state === "recording") {
                recorder.stop();
                ptt.classList.remove('recording');
                document.getElementById('ptt-icon').className = "fas fa-microphone";
            }
        };

        App.sendText = () => {
            const i = document.getElementById('m-inp');
            const rid = [myName, activePeer].sort().join('_');
            db.ref('chats/'+rid).push({ s: myName, msg: i.value, t: Date.now() });
            i.value = "";
        };

        App.sendVoice = (base64) => {
            const rid = [myName, activePeer].sort().join('_');
            db.ref('chats/'+rid).push({ s: myName, msg: base64, type: 'voice', t: Date.now() });
        };

        // --- ЗВОНКИ (AGORA) ---
        const Voice = {
            client: null,
            startCall: async (video = false) => {
                document.getElementById('call-ui').classList.add('active');
                Voice.client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                await Voice.client.join("e3af51022f9541388ad48fa2675fc3fb", "Global", null, null);
                const a = await AgoraRTC.createMicrophoneAudioTrack();
                let tracks = [a];
                if(video) {
                    const v = await AgoraRTC.createCameraVideoTrack();
                    tracks.push(v);
                    v.play("local-v");
                }
                await Voice.client.publish(tracks);
                Voice.client.on("user-published", async (u, m) => {
                    await Voice.client.subscribe(u, m);
                    if(m === "video") u.videoTrack.play("remote-v");
                    if(m === "audio") u.audioTrack.play();
                });
            },
            endCall: () => {
                location.reload(); // Простой способ сбросить звонок
            }
        };

        App.renderList();
    </script>
</body>
</html>
