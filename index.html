<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TITAN PERSISTENT</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #05070a; --panel: #0d1117; --accent: #00f2ff;
            --me: #0088cc; --him: #1c252f; --text: #e6edf3; --danger: #ff3b30;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }

        .screen { position: fixed; inset: 0; display: none; background: var(--bg); z-index: 100; }
        .screen.active { display: flex; flex-direction: column; }

        /* AUTH */
        .auth-box { margin: auto; width: 90%; max-width: 380px; padding: 30px; background: var(--panel); border-radius: 20px; border: 1px solid #30363d; text-align: center; }
        .t-input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none; }
        .t-btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }

        /* MAIN APP */
        .app-layout { display: flex; width: 100%; height: 100vh; }
        .sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: var(--panel); z-index: 2000; transition: 0.3s; border-right: 1px solid #30363d; }
        .sidebar.active { left: 0; box-shadow: 10px 0 30px #000; }
        
        .contacts-bar { width: 300px; background: var(--panel); border-right: 1px solid #161b22; display: flex; flex-direction: column; }
        .c-item { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #161b22; cursor: pointer; }
        .c-item:active { background: #1c2128; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .msg-wall { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 75%; font-size: 15px; line-height: 1.4; }
        .bubble.me { align-self: flex-end; background: var(--me); border-bottom-right-radius: 2px; }
        .bubble.him { align-self: flex-start; background: var(--him); border-bottom-left-radius: 2px; }

        /* CALL */
        .call-ui { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        .call-ui.active { display: flex; }
        #remote-v { position: absolute; inset:0; }
        #local-v { position: absolute; top: 50px; right: 20px; width: 100px; height: 150px; border-radius: 10px; border: 1px solid var(--accent); z-index: 10; background: #111; overflow: hidden; }
        .controls { position: absolute; bottom: 60px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 100; }
        .c-btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: #fff; backdrop-filter: blur(10px); transition: 0.2s; }
        .c-btn.off { background: var(--danger); }

        @media (max-width: 768px) { .contacts-bar { display: none; } }
    </style>
</head>
<body>

    <section id="scr-auth" class="screen">
        <div class="auth-box">
            <h1 style="color: var(--accent); margin-bottom: 20px;">TITAN</h1>
            <input type="text" id="in-user" class="t-input" placeholder="Введите ваш ник">
            <button class="t-btn" onclick="Core.doLogin()">ПОДПИСАТЬСЯ</button>
        </div>
    </section>

    <section id="scr-main" class="screen">
        <div class="app-layout">
            <div id="sidebar" class="sidebar">
                <div style="padding: 30px; text-align: center; border-bottom: 1px solid #333;">
                    <div id="ui-ava" style="width:60px;height:60px;background:var(--accent);border-radius:50%;color:#000;display:flex;align-items:center;justify-content:center;font-weight:bold;margin:0 auto 10px;font-size:24px;">?</div>
                    <h3 id="ui-nick">...</h3>
                </div>
                <div style="padding: 20px; cursor: pointer;" onclick="Core.showAdd()"><i class="fas fa-user-plus"></i> Добавить друга</div>
                <div style="padding: 20px; cursor: pointer; color: var(--danger); margin-top: auto;" onclick="Core.logout()">Выйти (Сброс)</div>
            </div>

            <aside class="contacts-bar">
                <div style="padding: 20px; font-weight: 800; border-bottom: 1px solid #333; display:flex; justify-content:space-between;">
                    ЧАТЫ <i class="fas fa-plus" onclick="Core.showAdd()"></i>
                </div>
                <div id="contacts-list" style="flex:1; overflow-y:auto;"></div>
            </aside>

            <main class="chat-area">
                <header style="padding: 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333;">
                    <i class="fas fa-bars" style="font-size:20px; color:var(--accent);" onclick="document.getElementById('sidebar').classList.toggle('active')"></i>
                    <b id="chat-title">Выберите чат</b>
                    <div id="call-btns" style="display: none; gap: 20px; color: var(--accent); font-size:20px;">
                        <i class="fas fa-phone" onclick="Core.startCall('audio')"></i>
                        <i class="fas fa-video" onclick="Core.startCall('video')"></i>
                    </div>
                </header>
                <div id="messages" class="msg-wall"></div>
                <div style="padding: 15px; background: var(--panel); display: flex; gap: 10px; border-top: 1px solid #333;">
                    <input type="text" id="msg-input" class="t-input" style="margin:0;" placeholder="Написать..." onkeypress="if(event.key==='Enter') Core.sendMsg()">
                    <button class="t-btn" style="width: 60px;" onclick="Core.sendMsg()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </main>
        </div>
    </section>

    <div id="scr-call" class="call-ui">
        <div id="remote-v"></div>
        <div id="local-v"></div>
        <div class="controls">
            <div id="m-mic" class="c-btn" onclick="Core.toggleMedia('audio')"><i class="fas fa-microphone"></i></div>
            <div class="c-btn" style="background: var(--danger);" onclick="Core.endCall()"><i class="fas fa-phone-slash"></i></div>
            <div id="m-cam" class="c-btn" onclick="Core.toggleMedia('video')"><i class="fas fa-video"></i></div>
        </div>
    </div>

    <script>
        const KEYS = { audio: "e3af51022f9541388ad48fa2675fc3fb", video: "1a8f4707f44e49ca81e2903dc2bab4a7" };
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']); 

        const Core = {
            user: localStorage.getItem('t_user'),
            friends: JSON.parse(localStorage.getItem('t_friends') || '[]'),
            activeChat: null,
            client: null,
            tracks: { audio: null, video: null },

            init: () => {
                if(!Core.user) {
                    document.getElementById('scr-auth').classList.add('active');
                } else {
                    document.getElementById('scr-main').classList.add('active');
                    document.getElementById('ui-nick').innerText = Core.user;
                    document.getElementById('ui-ava').innerText = Core.user[0].toUpperCase();
                    Core.renderFriends();
                }
            },

            doLogin: () => {
                const n = document.getElementById('in-user').value.trim();
                if(n) { 
                    localStorage.setItem('t_user', n); 
                    location.reload(); 
                }
            },

            logout: () => {
                localStorage.clear();
                location.reload();
            },

            showAdd: () => {
                const n = prompt("Имя друга:");
                if(n && n.trim() !== "") {
                    const friend = n.trim();
                    if(!Core.friends.includes(friend)) {
                        Core.friends.push(friend);
                        localStorage.setItem('t_friends', JSON.stringify(Core.friends));
                        Core.renderFriends();
                    }
                }
            },

            renderFriends: () => {
                const list = document.getElementById('contacts-list');
                list.innerHTML = Core.friends.map(f => `
                    <div class="c-item" onclick="Core.selectChat('${f}')">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div style="width:40px;height:40px;background:var(--accent);border-radius:50%;color:#000;display:flex;align-items:center;justify-content:center;font-weight:bold;">${f[0].toUpperCase()}</div>
                            <b>${f}</b>
                        </div>
                        <i class="fas fa-chevron-right" style="opacity:0.3; font-size:12px;"></i>
                    </div>
                `).join('');
            },

            selectChat: (name) => {
                Core.activeChat = name;
                document.getElementById('chat-title').innerText = name;
                document.getElementById('call-btns').style.display = 'flex';
                document.getElementById('messages').innerHTML = "";
                document.getElementById('sidebar').classList.remove('active');

                // Синхронизация сообщений через GUN
                const roomID = [Core.user, name].sort().join('_');
                gun.get('titan_p2p_v2').get(roomID).map().on((data) => {
                    if(data && data.msg) Core.drawMsg(data);
                });
            },

            sendMsg: () => {
                const inp = document.getElementById('msg-input');
                if(!inp.value.trim() || !Core.activeChat) return;
                
                const roomID = [Core.user, Core.activeChat].sort().join('_');
                gun.get('titan_p2p_v2').get(roomID).set({
                    sender: Core.user,
                    msg: inp.value,
                    time: Date.now()
                });
                inp.value = "";
            },

            drawMsg: (data) => {
                const wall = document.getElementById('messages');
                // Проверка на дубликаты по времени (упрощенно)
                const id = "msg-" + data.time;
                if(document.getElementById(id)) return;

                const div = document.createElement('div');
                div.id = id;
                div.className = `bubble ${data.sender === Core.user ? 'me' : 'him'}`;
                div.innerText = data.msg;
                wall.appendChild(div);
                wall.scrollTop = wall.scrollHeight;
            },

            startCall: async (type) => {
                document.getElementById('scr-call').classList.add('active');
                Core.client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                try {
                    await Core.client.join(KEYS[type], "GlobalTitanRoom", null, null);
                    Core.tracks.audio = await AgoraRTC.createMicrophoneAudioTrack();
                    let t = [Core.tracks.audio];
                    if(type === 'video') {
                        Core.tracks.video = await AgoraRTC.createCameraVideoTrack();
                        t.push(Core.tracks.video);
                        Core.tracks.video.play("local-v");
                    }
                    await Core.client.publish(t);
                    Core.client.on("user-published", async (u, m) => {
                        await Core.client.subscribe(u, m);
                        if(m === 'video') u.videoTrack.play("remote-v");
                        if(m === 'audio') u.audioTrack.play();
                    });
                } catch(e) { Core.endCall(); }
            },

            toggleMedia: (mode) => {
                const track = mode === 'audio' ? Core.tracks.audio : Core.tracks.video;
                if(!track) return;
                const state = track.enabled;
                track.setEnabled(!state);
                document.getElementById(mode === 'audio' ? 'm-mic' : 'm-cam').classList.toggle('off', state);
            },

            endCall: async () => {
                if(Core.tracks.audio) { Core.tracks.audio.stop(); Core.tracks.audio.close(); }
                if(Core.tracks.video) { Core.tracks.video.stop(); Core.tracks.video.close(); }
                if(Core.client) await Core.client.leave();
                document.getElementById('scr-call').classList.remove('active');
            }
        };

        window.onload = Core.init;
    </script>
</body>
</html>
