<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TITAN | IRONCLAD</title>
    
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #05070a; --panel: #0d1117; --accent: #00f2ff;
            --me: #0088cc; --him: #1c252f; --text: #e6edf3;
            --danger: #ff3b30;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }

        /* --- SCREENS --- */
        .screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; }
        .screen.active { display: flex; }

        /* --- AUTH --- */
        .auth-box { margin: auto; width: 90%; max-width: 380px; text-align: center; padding: 30px; background: var(--panel); border-radius: 24px; border: 1px solid #1e2631; }
        .t-input { width: 100%; padding: 16px; background: #000; border: 1px solid #333; border-radius: 14px; color: #fff; margin-bottom: 12px; outline: none; font-size: 16px; }
        .t-btn { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 16px; }

        /* --- MAIN APP --- */
        .app-shell { display: flex; width: 100%; height: 100vh; }
        .sidebar { position: fixed; left: -300px; top: 0; width: 300px; height: 100%; background: var(--panel); border-right: 1px solid #30363d; z-index: 2000; transition: 0.3s; }
        .sidebar.active { left: 0; box-shadow: 20px 0 50px #000; }
        
        .contacts-panel { width: 320px; background: var(--panel); border-right: 1px solid #1e2631; display: flex; flex-direction: column; }
        .c-item { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #161b22; cursor: pointer; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header { padding: 15px 20px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e2631; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }

        /* --- MODALS --- */
        .t-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .t-modal.active { display: flex; }
        .modal-box { width: 90%; max-width: 350px; background: var(--panel); padding: 25px; border-radius: 20px; }

        /* --- CALL UI --- */
        .call-screen { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .call-screen.active { display: flex; }
        #remote-video { position: absolute; inset: 0; }
        #local-video { position: absolute; top: 50px; right: 20px; width: 100px; height: 150px; border-radius: 12px; border: 1px solid var(--accent); background: #111; z-index: 10; }

        @media (max-width: 768px) { .contacts-panel { display: none; } }
    </style>
</head>
<body>

    <section id="screen-auth" class="screen">
        <div class="auth-box">
            <h1 style="margin-bottom: 10px; font-size: 32px; color: var(--accent);">TITAN</h1>
            <p style="margin-bottom: 30px; opacity: 0.6;">Вход в защищенную сеть</p>
            <input type="text" id="reg-name" class="t-input" placeholder="Ваш ник">
            <input type="password" id="reg-pass" class="t-input" placeholder="Пароль">
            <button class="t-btn" onclick="Core.Auth.register()">ВОЙТИ</button>
        </div>
    </section>

    <section id="screen-app" class="screen">
        <div class="app-shell">
            <nav id="sidebar" class="sidebar">
                <div style="padding: 40px 20px; text-align: center; border-bottom: 1px solid #222;">
                    <div id="ui-my-avatar" class="avatar" style="width:70px; height:70px; margin: 0 auto 10px; font-size: 24px;">?</div>
                    <h2 id="ui-my-name">User</h2>
                </div>
                <div style="padding: 20px; cursor: pointer;" onclick="Core.UI.modal('add')"><i class="fas fa-plus-circle"></i> Добавить контакт</div>
                <div style="padding: 20px; cursor: pointer;" onclick="Core.UI.modal('settings')"><i class="fas fa-cog"></i> Настройки</div>
                <div style="padding: 20px; cursor: pointer; color: var(--danger); margin-top: auto;" onclick="localStorage.clear(); location.reload();">Выйти</div>
            </nav>

            <aside class="contacts-panel">
                <div style="padding: 20px; font-weight: 900; border-bottom: 1px solid #222;">КОНТАКТЫ</div>
                <div id="ui-contacts-list" style="flex: 1; overflow-y: auto;"></div>
            </aside>

            <main class="chat-main">
                <header class="chat-header">
                    <i class="fas fa-bars" style="color: var(--accent); font-size: 20px;" onclick="Core.UI.toggleMenu()"></i>
                    <b id="ui-chat-title">Выберите контакт</b>
                    <div id="ui-actions" style="display: none; gap: 20px; color: var(--accent); font-size: 20px;">
                        <i class="fas fa-phone" onclick="Core.Media.call('audio')"></i>
                        <i class="fas fa-video" onclick="Core.Media.call('video')"></i>
                    </div>
                </header>
                <div class="messages" id="ui-messages"></div>
                <div style="padding: 15px; background: var(--panel); display: flex; gap: 10px;">
                    <input type="text" id="ui-msg-input" class="t-input" style="margin:0;" placeholder="Сообщение...">
                    <button class="t-btn" style="width: 60px;" onclick="Core.Chat.send()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </main>
        </div>
    </section>

    <div id="modal-sys" class="t-modal">
        <div class="modal-box" id="modal-content"></div>
    </div>

    <div id="screen-call" class="call-screen">
        <div id="remote-video"></div>
        <div id="local-video"></div>
        <div style="z-index: 100; text-align: center;">
            <h2 id="ui-call-name">Вызов...</h2>
            <p id="ui-call-status">Подключение Agora</p>
            <div class="t-btn" style="width:70px; height:70px; border-radius:50%; background:var(--danger); margin-top: 50px; display:flex; align-items:center; justify-content:center;" onclick="Core.Media.hangup()">
                <i class="fas fa-phone-slash" style="color: #fff; font-size: 24px;"></i>
            </div>
        </div>
    </div>

    <script>
        const KEYS = { audio: "e3af51022f9541388ad48fa2675fc3fb", video: "1a8f4707f44e49ca81e2903dc2bab4a7" };

        const Core = {
            state: { 
                user: localStorage.getItem('t_user'), 
                contacts: JSON.parse(localStorage.getItem('t_contacts') || '[]'),
                activePeer: null, client: null, tracks: [] 
            },

            Auth: {
                register: function() {
                    const name = document.getElementById('reg-name').value;
                    if(!name) return;
                    localStorage.setItem('t_user', name);
                    Core.state.user = name;
                    location.reload();
                }
            },

            UI: {
                toggleMenu: () => document.getElementById('sidebar').classList.toggle('active'),
                modal: function(type) {
                    const m = document.getElementById('modal-sys');
                    const c = document.getElementById('modal-content');
                    m.classList.add('active');
                    if(type === 'add') {
                        c.innerHTML = `<h3>Добавить контакт</h3><input id="add-name" class="t-input" style="margin-top:15px;" placeholder="Имя друга"><button class="t-btn" onclick="Core.Action.add()">ДОБАВИТЬ</button><p onclick="Core.UI.closeModal()" style="margin-top:10px; opacity:0.5; cursor:pointer;">Отмена</p>`;
                    } else if(type === 'settings') {
                        c.innerHTML = `<h3>Настройки</h3><p style="margin:10px 0;">Ваш ник: ${Core.state.user}</p><button class="t-btn" onclick="Core.UI.closeModal()">ЗАКРЫТЬ</button>`;
                    }
                },
                closeModal: () => document.getElementById('modal-sys').classList.remove('active'),
                updateContacts: function() {
                    const list = document.getElementById('ui-contacts-list');
                    list.innerHTML = Core.state.contacts.map(c => `
                        <div class="c-item" onclick="Core.Chat.select('${c}')">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="avatar">${c[0]}</div><b>${c}</b>
                            </div>
                            <i class="fas fa-times" style="opacity:0.3;" onclick="event.stopPropagation(); Core.Action.delete('${c}')"></i>
                        </div>
                    `).join('');
                }
            },

            Chat: {
                select: (name) => {
                    Core.state.activePeer = name;
                    document.getElementById('ui-chat-title').innerText = name;
                    document.getElementById('ui-actions').style.display = 'flex';
                    document.getElementById('ui-messages').innerHTML = `<p style="text-align:center; opacity:0.3; margin-top:20px;">Начало чата с ${name}</p>`;
                },
                send: () => {
                    const inp = document.getElementById('ui-msg-input');
                    if(!inp.value || !Core.state.activePeer) return;
                    const msg = document.createElement('div');
                    msg.style = "align-self: flex-end; background: var(--me); padding: 12px; border-radius: 15px; margin-bottom: 5px; max-width: 80%;";
                    msg.innerText = inp.value;
                    document.getElementById('ui-messages').appendChild(msg);
                    inp.value = "";
                }
            },

            Media: {
                call: async function(type) {
                    document.getElementById('screen-call').classList.add('active');
                    document.getElementById('ui-call-name').innerText = Core.state.activePeer;
                    Core.state.client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                    try {
                        await Core.state.client.join(KEYS[type], "MainRoom", null, null);
                        const audio = await AgoraRTC.createMicrophoneAudioTrack();
                        Core.state.tracks = [audio];
                        if(type === 'video') {
                            const video = await AgoraRTC.createCameraVideoTrack();
                            Core.state.tracks.push(video);
                            video.play("local-video");
                        }
                        await Core.state.client.publish(Core.state.tracks);
                        Core.state.client.on("user-published", async (user, media) => {
                            await Core.state.client.subscribe(user, media);
                            if(media === 'video') user.videoTrack.play("remote-video");
                            if(media === 'audio') user.audioTrack.play();
                        });
                    } catch(e) { console.error(e); this.hangup(); }
                },
                hangup: async function() {
                    Core.state.tracks.forEach(t => { t.stop(); t.close(); });
                    if(Core.state.client) await Core.state.client.leave();
                    document.getElementById('screen-call').classList.remove('active');
                }
            },

            Action: {
                add: function() {
                    const name = document.getElementById('add-name').value;
                    if(!name) return;
                    Core.state.contacts.push(name);
                    localStorage.setItem('t_contacts', JSON.stringify(Core.state.contacts));
                    Core.UI.updateContacts();
                    Core.UI.closeModal();
                },
                delete: function(name) {
                    Core.state.contacts = Core.state.contacts.filter(c => c !== name);
                    localStorage.setItem('t_contacts', JSON.stringify(Core.state.contacts));
                    Core.UI.updateContacts();
                }
            }
        };

        window.onload = () => {
            if(!Core.state.user) {
                document.getElementById('screen-auth').classList.add('active');
            } else {
                document.getElementById('screen-app').classList.add('active');
                document.getElementById('ui-my-name').innerText = Core.state.user;
                document.getElementById('ui-my-avatar').innerText = Core.state.user[0].toUpperCase();
                Core.UI.updateContacts();
            }
        };
    </script>
</body>
</html>
