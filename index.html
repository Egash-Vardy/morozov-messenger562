<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>TITAN TOTAL CONTROL</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #05070a; --panel: #0d1117; --accent: #00f2ff;
            --me: #0088cc; --him: #1c252f; --text: #e6edf3;
            --danger: #ff3b30; --gray: #30363d;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        
        .screen { position: fixed; inset: 0; display: none; background: var(--bg); z-index: 100; }
        .screen.active { display: flex; flex-direction: column; }

        /* AUTH */
        .auth-box { margin: auto; width: 90%; max-width: 380px; padding: 30px; background: var(--panel); border-radius: 20px; border: 1px solid var(--gray); text-align: center; }
        .t-input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--gray); border-radius: 12px; color: #fff; margin-bottom: 10px; outline: none; }
        .t-btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }

        /* MAIN APP */
        .app-layout { display: flex; width: 100%; height: 100vh; }
        .sidebar-menu { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: var(--panel); z-index: 2000; transition: 0.3s; border-right: 1px solid var(--gray); }
        .sidebar-menu.active { left: 0; }
        
        .contacts-bar { width: 300px; background: var(--panel); border-right: 1px solid #161b22; display: flex; flex-direction: column; }
        .c-item { padding: 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #161b22; cursor: pointer; transition: 0.2s; }
        .c-item:active { background: #1c2128; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header { padding: 15px 20px; background: var(--panel); border-bottom: 1px solid var(--gray); display: flex; justify-content: space-between; align-items: center; }
        .msg-wall { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 80%; word-wrap: break-word; }
        .bubble.me { align-self: flex-end; background: var(--me); color: #fff; }
        
        /* CALL OVERLAY */
        .call-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        .call-overlay.active { display: flex; }
        #remote-v { position: absolute; inset: 0; }
        #local-v { position: absolute; top: 40px; right: 20px; width: 100px; height: 140px; border-radius: 10px; border: 1px solid var(--accent); background: #111; z-index: 5; }
        .call-tools { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 10; }
        .tool-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; color: #fff; }
        .tool-btn.off { background: var(--danger); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }

        @media (max-width: 700px) { .contacts-bar { display: none; } }
    </style>
</head>
<body>

    <section id="scr-auth" class="screen">
        <div class="auth-box">
            <h1>TITAN CORE</h1>
            <p style="margin-bottom: 20px; opacity: 0.5;">Регистрация в системе</p>
            <input type="text" id="in-user" class="t-input" placeholder="Никнейм">
            <button class="t-btn" onclick="App.doAuth()">ВОЙТИ</button>
        </div>
    </section>

    <section id="scr-main" class="screen">
        <div class="app-layout">
            <div id="sidebar" class="sidebar-menu">
                <div style="padding: 30px; text-align: center; border-bottom: 1px solid var(--gray);">
                    <div id="my-ava" class="avatar" style="width:60px; height:60px; margin:0 auto 10px;">?</div>
                    <h3 id="my-nick">User</h3>
                </div>
                <div style="padding: 20px; cursor: pointer;" onclick="App.showModal('add')"><i class="fas fa-plus"></i> Добавить друга</div>
                <div style="padding: 20px; cursor: pointer;" onclick="App.showModal('settings')"><i class="fas fa-cog"></i> Настройки</div>
                <div style="padding: 20px; color: var(--danger);" onclick="localStorage.clear(); location.reload();">Выйти</div>
            </div>

            <aside class="contacts-bar">
                <div style="padding: 20px; font-weight: 800; border-bottom: 1px solid var(--gray);">КОНТАКТЫ</div>
                <div id="contacts-list" style="flex: 1; overflow-y: auto;"></div>
            </aside>

            <main class="chat-area">
                <header class="chat-header">
                    <i class="fas fa-bars" onclick="document.getElementById('sidebar').classList.toggle('active')"></i>
                    <b id="chat-with">Выберите чат</b>
                    <div id="chat-btns" style="display: none; gap: 20px; color: var(--accent);">
                        <i class="fas fa-phone" onclick="App.startCall('audio')"></i>
                        <i class="fas fa-video" onclick="App.startCall('video')"></i>
                    </div>
                </header>
                <div id="messages" class="msg-wall"></div>
                <div style="padding: 15px; background: var(--panel); display: flex; gap: 10px;">
                    <input type="text" id="msg-input" class="t-input" style="margin:0;" placeholder="Написать...">
                    <button class="t-btn" style="width: 60px;" id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </main>
        </div>
    </section>

    <div id="scr-call" class="call-overlay">
        <div id="remote-v"></div>
        <div id="local-v"></div>
        <div class="call-tools">
            <div id="btn-mic" class="tool-btn" onclick="App.toggleMic()"><i class="fas fa-microphone"></i></div>
            <div class="tool-btn" style="background: var(--danger);" onclick="App.endCall()"><i class="fas fa-phone-slash"></i></div>
            <div id="btn-cam" class="tool-btn" onclick="App.toggleCam()"><i class="fas fa-video"></i></div>
        </div>
    </div>

    <div id="modal-sys" class="modal">
        <div class="auth-box" id="modal-body"></div>
    </div>

    <script>
        const AGORA_KEYS = { audio: "e3af51022f9541388ad48fa2675fc3fb", video: "1a8f4707f44e49ca81e2903dc2bab4a7" };

        const App = {
            user: localStorage.getItem('user'),
            contacts: JSON.parse(localStorage.getItem('contacts') || '[]'),
            currentChat: null,
            client: null,
            tracks: { audio: null, video: null },
            mute: { audio: false, video: false },

            init: () => {
                if(!App.user) {
                    document.getElementById('scr-auth').classList.add('active');
                } else {
                    document.getElementById('scr-main').classList.add('active');
                    document.getElementById('my-nick').innerText = App.user;
                    document.getElementById('my-ava').innerText = App.user[0].toUpperCase();
                    App.renderContacts();
                }
                // Инициализация кнопки отправки
                document.getElementById('send-btn').addEventListener('click', App.sendMsg);
            },

            doAuth: () => {
                const n = document.getElementById('in-user').value;
                if(n) { localStorage.setItem('user', n); location.reload(); }
            },

            showModal: (type) => {
                const m = document.getElementById('modal-sys');
                const b = document.getElementById('modal-body');
                m.classList.add('active');
                if(type === 'add') {
                    b.innerHTML = `<h3>Новый друг</h3><input id="new-friend" class="t-input" style="margin:15px 0;"><button class="t-btn" onclick="App.addFriend()">Добавить</button><p onclick="App.closeModal()">Отмена</p>`;
                }
            },
            closeModal: () => document.getElementById('modal-sys').classList.remove('active'),

            addFriend: () => {
                const n = document.getElementById('new-friend').value;
                if(n) {
                    App.contacts.push(n);
                    localStorage.setItem('contacts', JSON.stringify(App.contacts));
                    App.renderContacts();
                    App.closeModal();
                }
            },

            renderContacts: () => {
                const l = document.getElementById('contacts-list');
                l.innerHTML = App.contacts.map(c => `<div class="c-item" onclick="App.selectChat('${c}')"><div class="avatar">${c[0]}</div><b>${c}</b></div>`).join('');
            },

            selectChat: (name) => {
                App.currentChat = name;
                document.getElementById('chat-with').innerText = name;
                document.getElementById('chat-btns').style.display = 'flex';
                document.getElementById('messages').innerHTML = "";
                document.getElementById('sidebar').classList.remove('active');
            },

            sendMsg: () => {
                const i = document.getElementById('msg-input');
                if(!i.value || !App.currentChat) return;
                const d = document.createElement('div');
                d.className = "bubble me";
                d.innerText = i.value;
                document.getElementById('messages').appendChild(d);
                i.value = "";
                document.getElementById('messages').scrollTop = 10000;
            },

            startCall: async (type) => {
                document.getElementById('scr-call').classList.add('active');
                App.client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                try {
                    await App.client.join(AGORA_KEYS[type], "GlobalChannel", null, null);
                    App.tracks.audio = await AgoraRTC.createMicrophoneAudioTrack();
                    let publishTracks = [App.tracks.audio];

                    if(type === 'video') {
                        App.tracks.video = await AgoraRTC.createCameraVideoTrack();
                        publishTracks.push(App.tracks.video);
                        App.tracks.video.play("local-v");
                        document.getElementById('local-v').style.display = 'block';
                    } else {
                        document.getElementById('local-v').style.display = 'none';
                    }

                    await App.client.publish(publishTracks);
                    App.client.on("user-published", async (u, m) => {
                        await App.client.subscribe(u, m);
                        if(m === 'video') u.videoTrack.play("remote-v");
                        if(m === 'audio') u.audioTrack.play();
                    });
                } catch(e) { console.error(e); App.endCall(); }
            },

            toggleMic: () => {
                App.mute.audio = !App.mute.audio;
                App.tracks.audio.setEnabled(!App.mute.audio);
                document.getElementById('btn-mic').classList.toggle('off', App.mute.audio);
            },

            toggleCam: () => {
                if(!App.tracks.video) return;
                App.mute.video = !App.mute.video;
                App.tracks.video.setEnabled(!App.mute.video);
                document.getElementById('btn-cam').classList.toggle('off', App.mute.video);
            },

            endCall: async () => {
                if(App.tracks.audio) { App.tracks.audio.stop(); App.tracks.audio.close(); }
                if(App.tracks.video) { App.tracks.video.stop(); App.tracks.video.close(); }
                if(App.client) await App.client.leave();
                document.getElementById('scr-call').classList.remove('active');
            }
        };

        window.onload = App.init;
    </script>
</body>
</html>
