<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST BOOT</title>
</head>
<body style="background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;">

    <h1 id="status">СИСТЕМА ЖДЕТ</h1>
    <button id="test-btn" style="padding: 20px; background: red; color: white; border: none; border-radius: 10px;" onclick="check()">НАЖМИ МЕНЯ</button>

    <script>
        function check() {
            document.getElementById('status').innerText = "СКРИПТЫ РАБОТАЮТ!";
            document.getElementById('test-btn').style.background = "green";
            alert("Если ты это видишь, значит JS на телефоне активен!");
        }
    </script>
</body>
</html>
